name: security-action
description: Run security checks

inputs:
  token:
    description: GitHub token used to authenticate the checkout (required for private repositories).
    required: false
    default: ${{ github.token }}

runs:
  using: composite
  steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ inputs.token }}
        persist-credentials: true

    - name: Detect Cargo.lock changes
      id: cargo_lock
      shell: bash
      run: |
        set -euo pipefail

        changed=false

        if [[ -f Cargo.lock ]]; then
          base_sha=""
          if [[ -n "${PR_BASE_SHA}" ]]; then
            base_sha="${PR_BASE_SHA}"
          elif [[ -n "${BEFORE_SHA}" && "${BEFORE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            base_sha="${BEFORE_SHA}"
          elif [[ "${EVENT_NAME}" == "push" ]]; then
            changed=true
          fi

          if [[ -n "${base_sha}" ]]; then
            git fetch --no-tags --depth=1 origin "${base_sha}"
            if ! git diff --quiet "${base_sha}" HEAD -- Cargo.lock; then
              changed=true
            fi
          fi
        fi

        echo "changed=${changed}" >> "${GITHUB_OUTPUT}"
        echo "Cargo.lock changed: ${changed}"
      env:
        BEFORE_SHA: ${{ github.event.before }}
        EVENT_NAME: ${{ github.event_name }}
        PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}

    - uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
      with:
        tool: zizmor@1.24.1

    - name: Run zizmor
      shell: bash
      run: zizmor --config "${{ github.action_path }}/zizmor.yml" --strict-collection --show-audit-urls=always --min-severity=medium .

    - uses: taiki-e/install-action@055f5df8c3f65ea01cd41e9dc855becd88953486 # v2.75.18
      if: ${{ steps.cargo_lock.outputs.changed == 'true' }}
      with:
        tool: cargo-deny

    - name: Run cargo-deny
      if: ${{ steps.cargo_lock.outputs.changed == 'true' }}
      shell: bash
      run: cargo deny check --config "${{ github.action_path }}/deny.toml"
